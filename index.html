<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cosmic Elemental</title>
<meta name="description" content="A World Built for Artists">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Georgia, serif;
}

.container{
    width:100%;
    padding:20px;
}

/* PERFECT SIZE */
.logo{
    width:min(650px,80vw);
    height:auto;
    display:block;
}

.coming{
    margin-top:15px;
    font-size:1.1rem;
    letter-spacing:4px;
    color:#fff;
}
.social{
    margin-top:15px;
}

.social a{
    color:#fff;
    text-decoration:none;
    font-size:1.1rem;
}

.social a:hover{
    opacity:.6;
}

</style>
</head>

<body>

<div class="container">

    <img
        src="CE OG WHITE 1.png"
        alt="Cosmic Elemental"
        class="logo"
    >

    <div class="coming">
        COMING SOON
    </div>

    <div class="social">
        <a href="https://instagram.com/cosmicelemental" target="_blank">
            @cosmicelemental
        </a>
    </div>

</div>

</body>
</html>
