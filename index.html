<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cosmic Elemental</title>
<meta name="description" content="A World Built for Artists">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

background:
radial-gradient(
circle at 50% 35%,
#3B5CC4 0%,
#1A2855 25%,
#0D142B 50%,
#080808 100%
);

.container{
    width:100%;
    padding:20px;
}

/* PERFECT SIZE */
.logo{
    width:min(650px,80vw);
    height:auto;
    display:block;
    margin:0 auto;
}

.coming{
    margin-top:15px;
    font-size:1.1rem;
    letter-spacing:4px;
    color:#fff;
}

.social{
    margin-top:25px;
}

.social a{
    color:#fff;
    text-decoration:none;
    font-size:1.1rem;
    letter-spacing:1px;
    opacity:.9;
    transition:.3s;
}

.social a:hover{
    opacity:.6;
}

</style>
</head>

<body>

<div class="container">

    <img
        src="CE OG WHITE 1.png"
        alt="Cosmic Elemental"
        class="logo"
    >

    <div class="coming">
        COMING SOON
    </div>

    <div class="social">
        <a href="https://instagram.com/cosmicelemental" target="_blank">
            @cosmicelemental
        </a>
    </div>

</div>

</body>
</html>
